<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CNC İş Emri Takip</title>

<style>

body{
font-family:Arial;
background:#eeeeee;
margin:20px;
}

h1{
background:#1f4e79;
color:white;
padding:15px;
text-align:center;
}

.panel{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
}

button{
background:#1f4e79;
color:white;
border:0;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#163a5c;
}

.is{
border:1px solid #aaa;
padding:10px;
margin:10px;
border-radius:5px;
}

.aktif{
background:#c6efce;
}

.tamam{
background:#ddd;
}

.sil{
background:red;
}


</style>

</head>


<body>


<h1>
CNC İŞ EMRİ TAKİP SİSTEMİ
</h1>


<div class="panel">

<h2>Üretim Durumu</h2>

Tamamlanan Parça:

<b id="counter">
0
</b>


</div>



<div class="panel">

<h2>Yeni İş Emri</h2>


<input id="isNo"
placeholder="İş Emri No">


<button onclick="yeniIs()">
Yeni İş Oluştur
</button>


</div>




<div class="panel">

<h2>Bekleyen İşler</h2>

<div id="bekleyen"></div>


</div>





<div class="panel">

<h2>Aktif İş</h2>

<div id="aktif"></div>


</div>

<div class="panel">

<h2>🔧 Takım Durumu</h2>

<div id="takimlar"></div>

</div>




<div class="panel">

<h2>Tamamlanan İşler</h2>

<div id="tamamlanan"></div>


</div>



<script>


let data =
JSON.parse(localStorage.getItem("cncData"))
||
{
bekleyen:[],
aktif:null,
tamamlanan:[],
counter:0
};

let takimlar=[

"T01_AT0806_NC_PUNTA",
"T02_DR0420_9.7MM",
"T03_AT867_10MM",
"T04_ME0252_12MM_EM",
"T05_DR0504_10.5MM_MATKAP",
"T06_AT0662_0.458_EM_RM",
"T07_AT0663_.468_EM_RM",
"T08_ME0173_16MM_RGH",
"T09_ME0067_12MM_EM_RGH",
"T10_ME0067_12MM_EM_FIN",
"T11_AT0688_10MM_ENDMILL",
"T12_ME0250_8MM_EM",
"T13_MR0224_10MM_EM",
"T14_MB0106_8MM_CON_BN",
"T15_MR0225_12MM_EM",
"T16_MB0108_P6D_4TA",
"T17_AT0702_10MM_5FLT",
"T19_MB0107_10MM_3TA_CON_BN",
"T20_AT0747_10MM_5FLT",
"T21_AT0801_16MM_FIN",
"T22_AT0801_16MM_RGH",
"T23_MR0357_20MM_5F",
"T24_PME0003_10MM_EM",
"T25_AT0748_NEW_SC_FIN",
"T26_AT0748_NEW_SC_RGH"

];



let takimDurum =
JSON.parse(localStorage.getItem("takimDurum"))
||
{};




takimlar.forEach(t=>{

if(!takimDurum[t]){

takimDurum[t]={
durum:"ESKİ"
};

}

});

function kaydet(){

localStorage.setItem(
"cncData",
JSON.stringify(data)
);

}




function zaman(){

return new Date().toISOString();

}




function yeniIs(){


let no=document.getElementById("isNo").value;


if(no=="")
{
alert("İş emri numarası giriniz");
return;
}


data.bekleyen.push({

no:no

});


kaydet();

listele();


document.getElementById("isNo").value="";


}







function aktifEt(index){


if(data.aktif!=null){

alert("Zaten aktif bir iş var");

return;

}


let kisi=
prompt("Aktif eden kişi adı");


if(!kisi){

alert("İsim girmeden aktif edilemez");

return;

}



let is=data.bekleyen[index];


data.bekleyen.splice(index,1);


data.aktif={

no:is.no,

aktifZaman:zaman(),

aktifEden:kisi

};



kaydet();

listele();


}






function tamamla(){


let kisi=
prompt("Tamamlayan kişi adı");


if(!kisi)
{
alert("İsim girmeden tamamlanamaz");
return;
}



data.aktif.tamamZaman=zaman();

data.aktif.tamamlayan=kisi;


data.tamamlanan.push(data.aktif);


data.aktif=null;


data.counter++;


kaydet();

listele();


}







function tekrarAktif(index){


if(data.aktif!=null){

alert("Başka aktif iş var");

return;

}



let is=data.tamamlanan[index];


data.tamamlanan.splice(index,1);


is.aktifZaman=zaman();

is.aktifEden="Tekrar aktif edildi";


data.aktif=is;


kaydet();

listele();


}







function sureHesapla(a,b){


let fark =
new Date(b)-new Date(a);


let saat =
Math.floor(fark/3600000);


let dakika =
Math.floor((fark%3600000)/60000);


return saat+" saat "+dakika+" dakika";


}







function listele(){



document.getElementById("counter").innerHTML=
data.counter;



let b="";


data.bekleyen.forEach((x,i)=>{


b+=`

<div class="is">

<b>${x.no}</b>

<br>

<button onclick="aktifEt(${i})">

İşi Aktif Et

</button>


</div>


`;


});


document.getElementById("bekleyen").innerHTML=b;








let a="";


if(data.aktif){


a=`

<div class="is aktif">


<h3>${data.aktif.no}</h3>


Aktif zamanı:
${data.aktif.aktifZaman}

<br>

Aktif eden:
${data.aktif.aktifEden}


<br><br>


<button onclick="tamamla()">

Tamamla

</button>


</div>


`;

}


else{

a="Aktif iş yok";

}


document.getElementById("aktif").innerHTML=a;







let t="";


data.tamamlanan.forEach((x,i)=>{


t+=`

<div class="is tamam">


<b>${x.no}</b>

<br>

Aktif:
${x.aktifZaman}

<br>

Tamam:
${x.tamamZaman}

<br>

Aktif eden:
${x.aktifEden}

<br>

Tamamlayan:
${x.tamamlayan}

<br>

Süre:
${sureHesapla(x.aktifZaman,x.tamamZaman)}


<br><br>


<button onclick="tekrarAktif(${i})">

Tekrar Aktif Yap

</button>



</div>


`;



});


document.getElementById("tamamlanan").innerHTML=t;

// TAKIMLARI GÖSTER

let tk="";


takimlar.forEach(t=>{


tk += `

<div class="is">

<b>${t}</b>

<br>

Durum:
${takimDurum[t].durum}


<button onclick="takimDegistir('${t}')">

Değiştir

</button>


</div>


`;

});


document.getElementById("takimlar").innerHTML=tk;

}

function takimDegistir(t){


if(takimDurum[t].durum=="ESKİ"){

takimDurum[t].durum="YENİ";

}
else{

takimDurum[t].durum="ESKİ";

}


localStorage.setItem(
"takimDurum",
JSON.stringify(takimDurum)
);


listele();


}

listele();



</script>


</body>
</html>
