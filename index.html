<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC İş Emri Takip</title>
<style>
body{font-family:Arial, sans-serif;background:#f1f3f5;margin:0;padding:0;}
.container{max-width:1200px;margin:20px auto;padding:20px;}
.panel{background:white;border-radius:10px;padding:18px;margin-bottom:20px;box-shadow:0 10px 24px rgba(0,0,0,0.06);}
h1{margin:0 0 10px;font-size:2rem;color:#1f4e79;text-align:center;}
button{padding:10px 14px;background:#1f4e79;color:#fff;border:0;border-radius:6px;cursor:pointer;}
button:hover:not(:disabled){background:#163a5c;}
button:disabled{background:#999;cursor:not-allowed;}
input{padding:10px;width:100%;border:1px solid #ccc;border-radius:6px;margin:6px 0 12px;box-sizing:border-box;}
label{display:block;font-weight:700;margin-top:12px;}
.is{border:1px solid #ddd;border-radius:8px;padding:12px;margin-bottom:12px;}
.aktif{background:#eaf8ea;border-color:#c8e6c9;}
.tamam{background:#f7f7f7;border-color:#d3d3d3;}
.eski{background:#ffe5e5;border-color:#f5b7b7;}
.yeni{background:#e8f9e8;border-color:#a8e6a3;}
.status-button{padding:6px 10px;border:none;border-radius:6px;color:white;cursor:pointer;margin-top:8px;}
.status-button.eski{background:#d9534f;}
.status-button.yeni{background:#5cb85c;}
.change-label{display:inline-block;padding:4px 8px;background:#fff4cc;color:#7a5800;border-radius:6px;font-size:0.9rem;margin:6px 0;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:960px){.grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="container">
  <h1>CNC İŞ EMRİ TAKİP SİSTEMİ</h1>
  <div class="panel">
    <h2>Üretim Durumu</h2>
    <div>Toplam Tamamlanan Parça: <strong id="counter">0</strong></div>
  </div>
  <div class="grid">
    <div class="panel">
      <h2>Yeni İş Emri</h2>
      <label for="isNo">İş Emri No</label>
      <input id="isNo" placeholder="İş emri no girin">
      <button onclick="yeniIs()">Yeni İş Oluştur</button>
    </div>
    <div class="panel">
      <h2>Aktif/Completing Bilgileri</h2>
      <label for="aktifEdenInput">Aktif eden kişi</label>
      <input id="aktifEdenInput" placeholder="Aktif eden kişi">
      <label for="tamamlayanInput">Tamamlayan kişi</label>
      <input id="tamamlayanInput" placeholder="Tamamlayan kişi">
    </div>
  </div>
  <div class="grid">
    <div class="panel">
      <h2>Bekleyen İşler</h2>
      <div id="bekleyen"></div>
    </div>
    <div class="panel">
      <h2>Aktif İş</h2>
      <div id="aktif"></div>
    </div>
  </div>
  <div class="panel">
    <h2>🔧 Takım Durumu</h2>
    <div id="takimlar">Aktif iş yok</div>
  </div>
  <div class="panel">
    <h2>✅ Tamamlanan İşler</h2>
    <div id="tamamlanan"></div>
  </div>
</div>
<script>
const STORAGE_KEY = 'cncIsEmriData';
const takimListesi = [
  'T01_AT0806_NC_PUNTA','T02_DR0420_9.7MM','T03_AT867_10MM','T04_ME0252_12MM_EM','T05_DR0504_10.5MM_MATKAP','T06_AT0662_0.458_EM_RM','T07_AT0663_.468_EM_RM','T08_ME0173_16MM_RGH','T09_ME0067_12MM_EM_RGH','T10_ME0067_12MM_EM_FIN','T11_AT0688_10MM_ENDMILL','T12_ME0250_8MM_EM','T13_MR0224_10MM_EM','T14_MB0106_8MM_CON_BN','T15_MR0225_12MM_EM','T16_MB0108_P6D_4TA','T17_AT0702_10MM_5FLT','T19_MB0107_10MM_3TA_CON_BN','T20_AT0747_10MM_5FLT','T21_AT0801_16MM_FIN','T22_AT0801_16MM_RGH','T23_MR0357_20MM_5F','T24_PME0003_10MM_EM','T25_AT0748_NEW_SC_FIN','T26_AT0748_NEW_SC_RGH'
];
const birParcaDegisecek = [
  'T08_ME0173_16MM_RGH','T15_MR0225_12MM_EM','T04_ME0252_12MM_EM','T09_ME0067_12MM_EM_RGH','T23_MR0357_20MM_5F','T22_AT0801_16MM_RGH','T21_AT0801_16MM_FIN','T24_PME0003_10MM_EM','T19_MB0107_10MM_3TA_CON_BN','T20_AT0747_10MM_5FLT','T26_AT0748_NEW_SC_RGH','T25_AT0748_NEW_SC_FIN','T12_ME0250_8MM_EM','T13_MR0224_10MM_EM','T10_ME0067_12MM_EM_FIN'
];
const ucParcaDegisecek = [
  'T01_AT0806_NC_PUNTA','T02_DR0420_9.7MM','T03_AT867_10MM','T05_DR0504_10.5MM_MATKAP','T06_AT0662_0.458_EM_RM','T07_AT0663_.468_EM_RM','T11_AT0688_10MM_ENDMILL','T14_MB0106_8MM_CON_BN','T16_MB0108_P6D_4TA','T17_AT0702_10MM_5FLT'
];
let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {bekleyen:[],aktif:null,tamamlanan:[],counter:0};
function kaydet(){localStorage.setItem(STORAGE_KEY, JSON.stringify(data));}
function zaman(){return new Date().toLocaleString('tr-TR');}
function yeniTakimDurumu(){const liste={};takimListesi.forEach(t=>{liste[t]={durum:'ESKİ',degistiren:'',tarih:''};});return liste;}
function yeniIs(){const no=document.getElementById('isNo').value.trim();if(!no){alert('İş emri no giriniz');return;}data.bekleyen.push({no,olusturma:zaman(),takimlar:yeniTakimDurumu(),aktifZaman:'',aktifEden:'',tamamZaman:'',tamamlayan:''});document.getElementById('isNo').value='';kaydet();listele();}
function aktifEt(index){if(data.aktif){alert('Zaten aktif iş var');return;}const isim=document.getElementById('aktifEdenInput').value.trim();if(!isim){alert('Aktif eden kişi giriniz');return;}const is=data.bekleyen.splice(index,1)[0];is.aktifZaman=zaman();is.aktifEden=isim;is.tamamZaman='';is.tamamlayan='';data.aktif=is;document.getElementById('aktifEdenInput').value='';kaydet();listele();}
function tamamla(){if(!data.aktif){return;}const isim=document.getElementById('tamamlayanInput').value.trim();if(!isim){alert('Tamamlayan kişi giriniz');return;}data.aktif.tamamZaman=zaman();data.aktif.tamamlayan=isim;data.tamamlanan.push(data.aktif);data.aktif=null;data.counter++;document.getElementById('tamamlayanInput').value='';kaydet();listele();}
function tekrarAktif(index){if(data.aktif){alert('Önce aktif işi tamamlayın');return;}const isim=document.getElementById('aktifEdenInput').value.trim();if(!isim){alert('Aktif eden kişi giriniz');return;}const is=data.tamamlanan.splice(index,1)[0];is.aktifZaman=zaman();is.aktifEden=isim;is.tamamZaman='';is.tamamlayan='';data.aktif=is;document.getElementById('aktifEdenInput').value='';kaydet();listele();}
function takimDegistir(t){if(!data.aktif){return;}const takim=data.aktif.takimlar[t];if(takim.durum==='ESKİ'){takim.durum='YENİ';takim.degistiren=data.aktif.aktifEden||'Operatör';takim.tarih=zaman();}else{takim.durum='ESKİ';takim.degistiren='';takim.tarih='';}kaydet();listele();}
function sureHesapla(a,b){const diff=new Date(b)-new Date(a);if(isNaN(diff))return'';const saat=Math.floor(diff/3600000);const dakika=Math.floor((diff%3600000)/60000);return`${saat} saat ${dakika} dakika`;}
function tumTakimlarDegisecek(parcaNo){return parcaNo>0 && parcaNo%3===0;}
function degisecekMi(t){const parcaNo=data.counter+1;return tumTakimlarDegisecek(parcaNo) ? true : birParcaDegisecek.includes(t);}
function listele(){document.getElementById('counter').textContent=data.counter;const bekleyen=document.getElementById('bekleyen');if(data.bekleyen.length===0){bekleyen.innerHTML='<div>Bekleyen iş yok</div>';}else{bekleyen.innerHTML=data.bekleyen.map((x,i)=>`<div class="is"><b>${x.no}</b><br>Oluşturma: ${x.olusturma}<br><button onclick="aktifEt(${i})" ${data.aktif?'disabled':''}>İşi Aktif Et</button></div>`).join('');}const aktif=document.getElementById('aktif');if(data.aktif){aktif.innerHTML=`<div class="is aktif"><h3>${data.aktif.no}</h3>Aktif Eden: ${data.aktif.aktifEden}<br>Aktif Zaman: ${data.aktif.aktifZaman}<br><br><button onclick="tamamla()">Tamamla</button></div>`;}else{aktif.innerHTML='Aktif iş yok';}const takimlar=document.getElementById('takimlar');if(data.aktif){takimlar.innerHTML=takimListesi.map(t=>{const info=data.aktif.takimlar[t];const renk=info.durum==='YENİ'?'yeni':'eski';const label=degisecekMi(t)?'<div class="change-label">Değiştirilecek</div>':'';return`<div class="is ${renk}"><b>${t}</b><br>Durum: ${info.durum}<br>${label}${info.degistiren?`Değiştiren: ${info.degistiren}<br>`:''}${info.tarih?`Tarih: ${info.tarih}<br>`:''}<button class="status-button ${info.durum==='YENİ'?'yeni':'eski'}" onclick="takimDegistir('${t}')">${info.durum==='ESKİ'?'Yeni Yap':'Eski Yap'}</button></div>`;}).join('');}else{takimlar.innerHTML='Aktif iş yok';}const tamamlanan=document.getElementById('tamamlanan');if(data.tamamlanan.length===0){tamamlanan.innerHTML='<div>Tamamlanan iş yok</div>';}else{tamamlanan.innerHTML=data.tamamlanan.map((x,i)=>`<div class="is tamam"><b>${x.no}</b><br>Aktif Eden: ${x.aktifEden}<br>Aktif Zaman: ${x.aktifZaman}<br>Tamamlayan: ${x.tamamlayan}<br>Tamam Zaman: ${x.tamamZaman}<br>Toplam Süre: ${sureHesapla(x.aktifZaman,x.tamamZaman)}<br><br><button onclick="tekrarAktif(${i})">Tekrar Aktif Yap</button></div>`).join('');}}window.addEventListener('storage',()=>{const saved=JSON.parse(localStorage.getItem(STORAGE_KEY));if(saved)data=saved;listele();});listele();
</script>
</body>
</html>
