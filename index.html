<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CNC İş Emri Takip</title>
<style>
body{font-family:Arial, sans-serif;background:#f1f3f5;margin:0;padding:0;}
.container{max-width:1200px;margin:20px auto;padding:20px;}
.panel{background:white;border-radius:10px;padding:18px;margin-bottom:20px;box-shadow:0 10px 24px rgba(0,0,0,0.06);}
h1{margin:0 0 10px;font-size:2rem;color:#1f4e79;text-align:center;}
button{padding:10px 14px;background:#1f4e79;color:#fff;border:0;border-radius:6px;cursor:pointer;}
button:hover:not(:disabled){background:#163a5c;}
button:disabled{background:#999;cursor:not-allowed;}
input{padding:10px;width:100%;border:1px solid #ccc;border-radius:6px;margin:6px 0 12px;box-sizing:border-box;}
label{display:block;font-weight:700;margin-top:12px;}
.is{border:1px solid #ddd;border-radius:8px;padding:12px;margin-bottom:12px;}
.aktif{background:#eaf8ea;border-color:#c8e6c9;}
.tamam{background:#f7f7f7;border-color:#d3d3d3;}
.eski{background:#ffe5e5;border-color:#f5b7b7;}
.yeni{background:#e8f9e8;border-color:#a8e6a3;}
.status-button{padding:6px 10px;border:none;border-radius:6px;color:white;cursor:pointer;margin-top:8px;}
.status-button.eski{background:#d9534f;}
.status-button.yeni{background:#5cb85c;}
.change-label{display:inline-block;padding:4px 8px;background:#fff4cc;color:#7a5800;border-radius:6px;font-size:0.9rem;margin:6px 0;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
@media(max-width:960px){.grid{grid-template-columns:1fr;}}
#assistantFinishStamp{position:fixed;top:10px;right:10px;background:#1f4e79;color:#fff;padding:8px 10px;border-radius:8px;box-shadow:0 6px 14px rgba(0,0,0,0.12);font-size:0.9rem;z-index:9999}
</style>
</head>
<body>
<div class="container">
  <div id="assistantFinishStamp" title="Program yazmayı bitirdiğim zaman (kalıcı)">Yazma Bitti: —</div>
  <h1>CNC İŞ EMRİ TAKİP SİSTEMİ</h1>
  <div class="panel">
    <h2>Üretim Durumu</h2>
    <div>Toplam Tamamlanan Parça: <strong id="counter">0</strong></div>
    <div>Parça Döngüsü: <strong id="partLabel">1. parça - Tüm takımlar yeni</strong></div>
    <div>Versiyon: <strong id="appVersion">dev</strong> <button style="background:#c62828;margin-left:10px;padding:6px 10px;border-radius:6px;border:0;color:#fff;cursor:pointer;" onclick="temizleConfirm()">Tüm Verileri Sil</button></div>
  </div>
  <div class="grid">
    <div class="panel">
      <h2>Yeni İş Emri</h2>
      <label for="isNo">İş Emri No</label>
      <input id="isNo" placeholder="İş emri no girin">
      <button onclick="yeniIs()">Yeni İş Oluştur</button>
    </div>
    <div class="panel">
      <h2>Aktif/Completing Bilgileri</h2>
      <label for="aktifEdenInput">Aktif eden kişi</label>
      <input id="aktifEdenInput" placeholder="Aktif eden kişi">
      <label for="tamamlayanInput">Tamamlayan kişi</label>
      <input id="tamamlayanInput" placeholder="Tamamlayan kişi">
    </div>
    
  </div>
  <div class="grid">
    <div class="panel">
      <h2>Bekleyen İşler</h2>
      <div id="bekleyen"></div>
    </div>
    <div class="panel">
      <h2>Aktif İş</h2>
      <div id="aktif"></div>
    </div>
  </div>
  <div class="panel">
    <h2>🔧 Takım Durumu</h2>
    <div id="takimlar">Aktif iş yok</div>
  </div>
  <div class="panel">
    <h2>✅ Tamamlanan İşler</h2>
    <div id="tamamlanan"></div>
  </div>
</div>
<script>
const STORAGE_KEY = 'cncIsEmriData';
const APP_VERSION = 'dev-1';
const takimListesi = [
  'T01_AT0806_NC_PUNTA','T02_DR0420_9.7MM','T03_AT867_10MM','T04_ME0252_12MM_EM','T05_DR0504_10.5MM_MATKAP','T06_AT0662_0.458_EM_RM','T07_AT0663_.468_EM_RM','T08_ME0173_16MM_RGH','T09_ME0067_12MM_EM_RGH','T10_ME0067_12MM_EM_FIN','T11_AT0688_10MM_ENDMILL','T12_ME0250_8MM_EM','T13_MR0224_10MM_EM','T14_MB0106_8MM_CON_BN','T15_MR0225_12MM_EM','T16_MB0108_P6D_4TA','T17_AT0702_10MM_5FLT','T19_MB0107_10MM_3TA_CON_BN','T20_AT0747_10MM_5FLT','T21_AT0801_16MM_FIN','T22_AT0801_16MM_RGH','T23_MR0357_20MM_5F','T24_PME0003_10MM_EM','T25_AT0748_NEW_SC_FIN','T26_AT0748_NEW_SC_RGH'
];
const ucParcaDegisecek = [
  'T01_AT0806_NC_PUNTA','T02_DR0420_9.7MM','T03_AT867_10MM','T05_DR0504_10.5MM_MATKAP','T06_AT0662_0.458_EM_RM','T07_AT0663_.468_EM_RM','T11_AT0688_10MM_ENDMILL','T14_MB0106_8MM_CON_BN','T16_MB0108_P6D_4TA','T17_AT0702_10MM_5FLT'
];
function defaultData(){return {bekleyen:[],aktif:null,tamamlanan:[],counter:3,_updatedAt:0};}
let data = defaultData();
function loadData(){const value=localStorage.getItem(STORAGE_KEY);if(value){try{const parsed=JSON.parse(value);if(parsed&&typeof parsed==='object'){data=parsed;}else{data=defaultData();}}catch(e){data=defaultData();}}else{data=defaultData();}
  if(!Array.isArray(data.bekleyen)) data.bekleyen=[];
  if(!Array.isArray(data.tamamlanan)) data.tamamlanan=[];
  if(!('aktif' in data)) data.aktif=null;
  if(typeof data.counter!=='number') data.counter=0;
  if(data.counter < data.tamamlanan.length) data.counter = data.tamamlanan.length;
}
function kaydet(){
  data._updatedAt = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function zaman(){return new Date().toLocaleString('tr-TR');}
function parcaSiklus(parcaNo){return ((parcaNo-1)%4)+1;}
function parcaAciklama(parcaNo){const phase=parcaSiklus(parcaNo);
  if(phase===1) return '1. parça - Tüm takımlar yeni';
  if(phase===2) return '2. parça - 1 parçalık takımlar eski, 3 parçalık takımlar yeni';
  if(phase===3) return '3. parça - 1 parçalık takımlar eski, 3 parçalık takımlar yeni';
  return '4. parça - Tüm takımlar eski';
}
function isNewByCycle(t, parcaNo){const phase=parcaSiklus(parcaNo);
  if(phase===1) return true;
  if(phase===4) return false;
  return ucParcaDegisecek.includes(t);
}
function yeniTakimDurumu(parcaNo){const liste={};takimListesi.forEach(t=>{liste[t]={durum:'ESKİ',degistiren:'',tarih:'',untilCounter:0};});return liste;}
function yeniIs(){const no=document.getElementById('isNo').value.trim();if(!no){alert('İş emri no giriniz');return;}data.bekleyen.push({no,olusturma:zaman(),takimlar:yeniTakimDurumu(data.counter+1),aktifZaman:'',aktifEden:'',tamamZaman:'',tamamlayan:''});document.getElementById('isNo').value='';kaydet();listele();}
function aktifEt(index){if(data.aktif){alert('Zaten aktif iş var');return;}const isim=document.getElementById('aktifEdenInput').value.trim();if(!isim){alert('Aktif eden kişi giriniz');return;}const is=data.bekleyen.splice(index,1)[0];is.takimlar=yeniTakimDurumu(data.counter+1);is.aktifZaman=zaman();is.aktifEden=isim;is.tamamZaman='';is.tamamlayan='';data.aktif=is;document.getElementById('aktifEdenInput').value='';kaydet();listele();}
function tamamla(){if(!data.aktif){return;}const isim=document.getElementById('tamamlayanInput').value.trim();if(!isim){alert('Tamamlayan kişi giriniz');return;}data.aktif.tamamZaman=zaman();data.aktif.tamamlayan=isim;data.tamamlanan.push(data.aktif);data.aktif=null;data.counter++;document.getElementById('tamamlayanInput').value='';kaydet();listele();}
function tekrarAktif(index){if(data.aktif){alert('Önce aktif işi tamamlayın');return;}const isim=document.getElementById('aktifEdenInput').value.trim();if(!isim){alert('Aktif eden kişi giriniz');return;}const is=data.tamamlanan.splice(index,1)[0];is.takimlar=yeniTakimDurumu(data.counter+1);is.aktifZaman=zaman();is.aktifEden=isim;is.tamamZaman='';is.tamamlayan='';data.aktif=is;document.getElementById('aktifEdenInput').value='';kaydet();listele();}
function takimDegistir(t){
  if(!data.aktif) return;
  const takim = data.aktif.takimlar[t];
  const isUc = ucParcaDegisecek.includes(t);
  const nowCount = data.counter;
  // determine if currently active (still within untilCounter)
  const active = typeof takim.untilCounter==='number' && takim.untilCounter > nowCount;
  if(active){
    // turn back to ESki (clear untilCounter)
    takim.untilCounter = 0;
    takim.degistiren = '';
    takim.tarih = '';
  } else {
    // set as YENİ for next N parts
    const span = isUc ? 3 : 1;
    takim.untilCounter = nowCount + span;
    takim.degistiren = data.aktif.aktifEden || 'Operatör';
    takim.tarih = zaman();
  }
  kaydet(); listele();
}
function sureHesapla(a,b){const diff=new Date(b)-new Date(a);if(isNaN(diff))return'';const saat=Math.floor(diff/3600000);const dakika=Math.floor((diff%3600000)/60000);return`${saat} saat ${dakika} dakika`;}
function degisecekMi(t){const parcaNo=data.counter+1;return isNewByCycle(t, parcaNo);}
function listele(){const parcaNo=data.counter+1;document.getElementById('counter').textContent=data.counter;document.getElementById('partLabel').textContent=parcaAciklama(parcaNo);
  // show app version (development helper)
  try{document.getElementById('appVersion').textContent = APP_VERSION;}catch(e){}
  const bekleyen=document.getElementById('bekleyen');if(data.bekleyen.length===0){bekleyen.innerHTML='<div>Bekleyen iş yok</div>';}else{bekleyen.innerHTML=data.bekleyen.map((x,i)=>`<div class="is"><b>${x.no}</b><br>Oluşturma: ${x.olusturma}<br><button onclick="aktifEt(${i})" ${data.aktif?'disabled':''}>İşi Aktif Et</button></div>`).join('');}
  const aktif=document.getElementById('aktif');if(data.aktif){aktif.innerHTML=`<div class="is aktif"><h3>${data.aktif.no}</h3>Aktif Eden: ${data.aktif.aktifEden}<br>Aktif Zaman: ${data.aktif.aktifZaman}<br><br><button onclick="tamamla()">Tamamla</button></div>`;}else{aktif.innerHTML='Aktif iş yok';}
  const takimlar=document.getElementById('takimlar');
  if(data.aktif){
    takimlar.innerHTML = takimListesi.map(t => {
      const info = data.aktif.takimlar[t] || {};
      const isYeni = typeof info.untilCounter === 'number' && info.untilCounter > data.counter;
      const renk = isYeni ? 'yeni' : 'eski';
      let label = isYeni ? '<div class="change-label">Bu parçada yeni</div>' : '<div class="change-label">Bu parçada eski</div>';
      if(isYeni && ucParcaDegisecek.includes(t)){
        const remaining = Math.max(0, info.untilCounter - data.counter);
        label += `<div class="change-label">Kalan: ${remaining} parça</div>`;
      }
      return `<div class="is ${renk}"><b>${t}</b><br>Durum: ${isYeni ? 'YENİ' : 'ESKİ'}<br>${label}${info.degistiren?`Değiştiren: ${info.degistiren}<br>`:''}${info.tarih?`Tarih: ${info.tarih}<br>`:''}<button class="status-button ${isYeni?'yeni':'eski'}" onclick="takimDegistir('${t}')">${isYeni?'Eski Yap':'Yeni Yap'}</button></div>`;
    }).join('');
  } else {takimlar.innerHTML='Aktif iş yok';}
  const tamamlanan=document.getElementById('tamamlanan');
  if(!data.tamamlanan || data.tamamlanan.length===0){
    tamamlanan.innerHTML = '<div>Tamamlanan iş yok</div>';
  } else {
    const sorted = data.tamamlanan.slice().sort((a,b)=>{
      const ta = a.tamamZaman ? new Date(a.tamamZaman).getTime() : 0;
      const tb = b.tamamZaman ? new Date(b.tamamZaman).getTime() : 0;
      return tb - ta; // newest first
    });
    tamamlanan.innerHTML = sorted.map((x,i)=>{
      const origIndex = data.tamamlanan.indexOf(x);
      return `<div class="is tamam"><b>${x.no}</b><br>Aktif Eden: ${x.aktifEden}<br>Aktif Zaman: ${x.aktifZaman}<br>Tamamlayan: ${x.tamamlayan}<br>Tamam Zaman: ${x.tamamZaman}<br>Toplam Süre: ${sureHesapla(x.aktifZaman,x.tamamZaman)}<br><br><button onclick="tekrarAktif(${origIndex})">Tekrar Aktif Yap</button></div>`;
    }).join('');
  }
}
window.addEventListener('storage',()=>{loadData();listele();});
loadData();listele();

// show the current finish time for control verification
try{
  const el = document.getElementById('assistantFinishStamp');
  if(el) el.textContent = `Yazma Bitti: ${new Date().toLocaleTimeString('tr-TR')}`;
}catch(e){}

function temizleConfirm(){
  if(confirm('Tüm verileri silmek istediğinizden emin misiniz? Bu işlem geri alınamaz.')){
    temizle();
  }
}
function temizle(){
  try{ localStorage.removeItem(STORAGE_KEY); }catch(e){}
  data = defaultData();
  // For testing clear, reset counter to 0 so tamamlanan shows 0
  data.counter = 0;
  data.bekleyen = [];
  data.tamamlanan = [];
  data.aktif = null;
  kaydet();
  listele();
  try{ if(window.__cncSocket && window.__cncSocket.connected) window.__cncSocket.emit('push', data); }catch(e){}
}

// --- Real-time sync via Socket.IO ---
; (function(){
  function loadScript(src){return new Promise((resolve,reject)=>{const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=reject;document.head.appendChild(s);});}
  loadScript('/socket.io/socket.io.js').then(()=>{
    const CLIENT_ID = Math.random().toString(36).slice(2);
    const socket = io();
    window.__cncSocket = socket;

    socket.on('connect', ()=>{console.log('socket connected');});

    socket.on('data', srv => {
      if(!srv) return;
      const serverUpdated = srv._updatedAt || 0;
      const localUpdated = data._updatedAt || 0;
      if(serverUpdated > localUpdated && srv._clientId !== CLIENT_ID){
        data = srv; kaydet(); listele();
      }
    });

    // override kaydet to also push to server
    const originalKaydet = kaydet;
    kaydet = function(){
      data._clientId = CLIENT_ID;
      originalKaydet();
      try{ socket.emit('push', data); }catch(e){}
    }

    // request immediate sync
    try{ socket.emit('get'); }catch(e){}
  }).catch(()=>{console.warn('Socket.IO client failed to load, falling back to periodic sync');});
})();

// Ensure on focus / refresh we request latest from server when available
window.addEventListener('focus', async () => {
  try{
    if(window.__cncSocket){
      try{ window.__cncSocket.emit('get'); }catch(e){}
      return;
    }
    // fallback: HTTP fetch
    const res = await fetch('/api/data');
    if(!res.ok) return;
    const srv = await res.json();
    const serverUpdated = srv._updatedAt || 0;
    const localUpdated = data._updatedAt || 0;
    if(serverUpdated > localUpdated){ data = srv; kaydet(); listele(); }
  }catch(e){/* ignore */}
});
</script>
</body>
</html>
