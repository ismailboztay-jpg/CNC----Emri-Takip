<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CNC İş Emri ve Takım Takip Sistemi</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#eeeeee;
    margin:20px;
}


h1{
    background:#1f4e79;
    color:white;
    padding:15px;
    text-align:center;
    border-radius:8px;
}


h2{
    color:#1f4e79;
}


.panel{

    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:10px;
    box-shadow:0 0 5px #aaa;

}


input, select, button{

    padding:10px;
    margin:5px;
    font-size:14px;

}


input, select{

    width:180px;

}


button{

    background:#1f4e79;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;

}


button:hover{

    background:#163a5c;

}


table{

    width:100%;
    border-collapse:collapse;
    background:white;

}


th{

    background:#1f4e79;
    color:white;

}


td, th{

    border:1px solid #ccc;
    padding:8px;
    text-align:center;

}


.sil{

    background:#c00000;

}


.uyari{

    background:#ffc000;
    color:black;

}


.aktif{

    background:#70ad47;
    color:white;

}


</style>

</head>


<body>


<h1>
CNC İş Emri ve Takım Takip Sistemi
</h1>


<!-- İŞ EMRİ BÖLÜMÜ -->

<div class="panel">

<h2>📋 Yeni İş Emri</h2>


<input id="isno" placeholder="İş No">

<input id="parca" placeholder="Parça Adı">

<input id="musteri" placeholder="Müşteri">


<select id="tezgah">

<option>Tezgah Seç</option>
<option>Matsuura</option>
<option>Emco</option>
<option>DMG</option>
<option>Diğer</option>

</select>


<select id="durum">

<option>Bekliyor</option>
<option>Devam Ediyor</option>
<option>Tamamlandı</option>

</select>


<button onclick="isEkle()">
İş Emri Kaydet
</button>


</div>



<div class="panel">

<h2>📋 İş Emirleri</h2>


<table>

<thead>

<tr>

<th>İş No</th>
<th>Parça</th>
<th>Müşteri</th>
<th>Tezgah</th>
<th>Durum</th>
<th>Sil</th>

</tr>

</thead>


<tbody id="isListesi">

</tbody>


</table>


</div>





<!-- TAKIM BÖLÜMÜ -->


<div class="panel">


<h2>🔧 Takım Takip</h2>


<input id="takimNo" placeholder="Takım No (T01)">


<input id="takimKod" placeholder="Takım Kodu">


<input id="takimAdi" placeholder="Takım Adı">


<input id="omur" placeholder="Max Ömür">


<input id="kullanim" placeholder="Kullanım">


<select id="takimDurum">

<option>Aktif</option>
<option>Değişecek</option>
<option>Hurda</option>

</select>


<button onclick="takimEkle()">

Takım Kaydet

</button>


</div>



<div class="panel">


<h2>🔧 Takım Listesi</h2>


<table>


<thead>

<tr>

<th>T No</th>
<th>Kod</th>
<th>Takım</th>
<th>Ömür</th>
<th>Kalan</th>
<th>Durum</th>
<th>Sil</th>

</tr>


</thead>


<tbody id="takimListesi">

</tbody>


</table>


</div>
<script>


// ==========================
// İŞ EMRİ SİSTEMİ
// ==========================


let isler = JSON.parse(localStorage.getItem("isler")) || [];


function isGoster(){


let tablo=document.getElementById("isListesi");

tablo.innerHTML="";


isler.forEach((x,i)=>{


tablo.innerHTML += `

<tr>

<td>${x.no}</td>

<td>${x.parca}</td>

<td>${x.musteri}</td>

<td>${x.tezgah}</td>

<td>${x.durum}</td>

<td>
<button class="sil" onclick="isSil(${i})">
Sil
</button>
</td>

</tr>

`;

});


}



function isEkle(){


let yeni={

no:document.getElementById("isno").value,

parca:document.getElementById("parca").value,

musteri:document.getElementById("musteri").value,

tezgah:document.getElementById("tezgah").value,

durum:document.getElementById("durum").value

};


isler.push(yeni);


localStorage.setItem(
"isler",
JSON.stringify(isler)
);


isGoster();


}



function isSil(i){


isler.splice(i,1);


localStorage.setItem(
"isler",
JSON.stringify(isler)
);


isGoster();


}





// ==========================
// TAKIM SİSTEMİ
// ==========================


let takimlar = JSON.parse(localStorage.getItem("takimlar")) || [];



function takimGoster(){


let tablo=document.getElementById("takimListesi");

tablo.innerHTML="";


takimlar.forEach((x,i)=>{


let kalan = x.omur - x.kullanim;


let durum=x.durum;


if(kalan<=0){

durum="HURDA";

}

else if(kalan<10){

durum="DEĞİŞECEK";

}



tablo.innerHTML += `


<tr>


<td>${x.no}</td>

<td>${x.kod}</td>

<td>${x.adi}</td>

<td>${x.omur}</td>

<td>${kalan}</td>

<td>${durum}</td>


<td>

<button class="sil" onclick="takimSil(${i})">

Sil

</button>

</td>


</tr>


`;


});


}





function takimEkle(){



let yeni={


no:document.getElementById("takimNo").value,


kod:document.getElementById("takimKod").value,


adi:document.getElementById("takimAdi").value,


omur:Number(document.getElementById("omur").value),


kullanim:Number(document.getElementById("kullanim").value),


durum:document.getElementById("takimDurum").value



};



takimlar.push(yeni);



localStorage.setItem(

"takimlar",

JSON.stringify(takimlar)

);



takimGoster();



}





function takimSil(i){


takimlar.splice(i,1);


localStorage.setItem(

"takimlar",

JSON.stringify(takimlar)

);



takimGoster();


}




// Sayfa açılışında yükle

isGoster();

takimGoster();


</script>


</body>
</html>
