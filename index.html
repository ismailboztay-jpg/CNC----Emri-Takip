<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toplama Programı</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 40px; }
.container { max-width: 480px; margin: auto; background: #fff; padding: 24px; border-radius: 12px; box-shadow: 0 12px 24px rgba(0,0,0,0.1); }
h1 { font-size: 1.7rem; color: #1f4e79; margin-bottom: 18px; text-align: center; }
label { display: block; margin-top: 14px; font-weight: 700; color: #333; }
input { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; }
button { width: 100%; margin-top: 18px; padding: 12px; border: none; border-radius: 8px; background: #1f4e79; color: white; font-size: 1rem; cursor: pointer; }
button:hover { background: #163a5c; }
.result { margin-top: 20px; padding: 14px; background: #e7f3ff; border: 1px solid #b8dbf5; border-radius: 8px; color: #0f3d72; font-weight: 700; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <h1>Toplama Programı</h1>
  <label for="sayi1">1. Sayı</label>
  <input id="sayi1" type="number" placeholder="Birinci sayıyı girin">
  <label for="sayi2">2. Sayı</label>
  <input id="sayi2" type="number" placeholder="İkinci sayıyı girin">
  <button onclick="topla()">Topla</button>
  <div id="sonuc" class="result">Sonuç burada görünecek</div>
</div>
<script>
function topla() {
  const a = parseFloat(document.getElementById('sayi1').value) || 0;
  const b = parseFloat(document.getElementById('sayi2').value) || 0;
  const toplam = a + b;
  document.getElementById('sonuc').textContent = 'Toplam: ' + toplam;
}
</script>
</body>
</html>
