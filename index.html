<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CNC İş Emri Takip Sistemi</title>


<style>

body{

font-family:Arial;
background:#eeeeee;
margin:20px;

}


h1{

background:#1f4e79;
color:white;
padding:15px;
text-align:center;
border-radius:10px;

}


.panel{

background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;

}



input{

padding:10px;
margin:5px;
width:180px;

}



button{

padding:10px;
margin:5px;
background:#1f4e79;
color:white;
border:0;
border-radius:5px;
cursor:pointer;

}


button:hover{

background:#163a5c;

}



.is{

border:1px solid #aaa;
padding:10px;
margin:10px;
border-radius:8px;

}


.aktif{

background:#c6efce;
border:2px solid green;

}



.tamam{

background:#ddd;

}



.eski{

background:#ffcccc;
color:black;

}



.yeni{

background:#99ff99;
color:black;

}



.degis{

color:red;
font-weight:bold;

}



table{

width:100%;
border-collapse:collapse;

}



td,th{

border:1px solid #aaa;
padding:8px;
text-align:center;

}


th{

background:#1f4e79;
color:white;

}



</style>


</head>


<body>


<h1>
CNC İŞ EMRİ TAKİP SİSTEMİ
</h1>



<div class="panel">


<h2>Üretim Durumu</h2>


Tamamlanan Parça Sayısı:

<b id="counter">
0
</b>


</div>





<div class="panel">


<h2>Yeni İş Emri</h2>


<input id="isNo" placeholder="İş Emri No">


<button onclick="yeniIs()">

Yeni İş Oluştur

</button>


</div>





<div class="panel">


<h2>Bekleyen İşler</h2>


<div id="bekleyen"></div>


</div>







<div class="panel">


<h2>🟢 Aktif İş</h2>


<div id="aktif"></div>


</div>







<div class="panel">


<h2>🔧 Takım Durumu</h2>


<div id="takimlar">

Aktif iş bekleniyor...

</div>


</div>








<div class="panel">


<h2>✅ Tamamlanan İşler</h2>


<div id="tamamlanan"></div>


</div>




<script>
    
// =============================
// VERİ SİSTEMİ
// =============================


let data =
JSON.parse(localStorage.getItem("cncData"))
||
{
bekleyen:[],
aktif:null,
tamamlanan:[],
counter:0
};





// =============================
// TAKIM LİSTESİ
// =============================


let takimlar=[


"T01_AT0806_NC_PUNTA",
"T02_DR0420_9.7MM",
"T03_AT867_10MM",
"T04_ME0252_12MM_EM",
"T05_DR0504_10.5MM_MATKAP",
"T06_AT0662_0.458_EM_RM",
"T07_AT0663_.468_EM_RM",
"T08_ME0173_16MM_RGH",
"T09_ME0067_12MM_EM_RGH",
"T10_ME0067_12MM_EM_FIN",
"T11_AT0688_10MM_ENDMILL",
"T12_ME0250_8MM_EM",
"T13_MR0224_10MM_EM",
"T14_MB0106_8MM_CON_BN",
"T15_MR0225_12MM_EM",
"T16_MB0108_P6D_4TA",
"T17_AT0702_10MM_5FLT",
"T19_MB0107_10MM_3TA_CON_BN",
"T20_AT0747_10MM_5FLT",
"T21_AT0801_16MM_FIN",
"T22_AT0801_16MM_RGH",
"T23_MR0357_20MM_5F",
"T24_PME0003_10MM_EM",
"T25_AT0748_NEW_SC_FIN",
"T26_AT0748_NEW_SC_RGH"


];





let takimDurum =
JSON.parse(localStorage.getItem("takimDurum"))
||
{};




takimlar.forEach(t=>{


if(!takimDurum[t]){


takimDurum[t]={

durum:"ESKİ"

};


}


});






function kaydet(){


localStorage.setItem(
"cncData",
JSON.stringify(data)
);


localStorage.setItem(
"takimDurum",
JSON.stringify(takimDurum)
);


}







function zaman(){


return new Date().toISOString();


}







// =============================
// YENİ İŞ OLUŞTUR
// =============================



function yeniIs(){


let no=
document.getElementById("isNo").value;



if(no==""){

alert("İş emri no giriniz");

return;

}




data.bekleyen.push({

no:no

});



kaydet();

listele();


document.getElementById("isNo").value="";


}









// =============================
// İŞ AKTİF ET
// =============================



function aktifEt(index){


if(data.aktif!=null){


alert("Başka aktif iş var");

return;


}



let kisi =
prompt("Aktif eden kişi:");



if(!kisi){

alert("İsim giriniz");

return;

}



let is =
data.bekleyen[index];



data.bekleyen.splice(index,1);



data.aktif={


no:is.no,

aktifZaman:zaman(),

aktifEden:kisi


};



kaydet();

listele();



}







// =============================
// TAMAMLA
// =============================


function tamamla(){



let kisi =
prompt("Tamamlayan kişi:");



if(!kisi){

alert("İsim giriniz");

return;

}



data.aktif.tamamZaman=zaman();


data.aktif.tamamlayan=kisi;



data.tamamlanan.push(
data.aktif
);



data.aktif=null;


data.counter++;



kaydet();


listele();



}

// =============================
// TEKRAR AKTİF YAP
// =============================


function tekrarAktif(index){


if(data.aktif!=null){

alert("Zaten aktif iş var");

return;

}


let is=data.tamamlanan[index];


data.tamamlanan.splice(index,1);



is.aktifZaman=zaman();

is.aktifEden="Tekrar aktif edildi";


data.aktif=is;


kaydet();

listele();


}






// =============================
// TAKIM DEĞİŞTİR
// =============================


function takimDegistir(t){



if(takimDurum[t].durum=="ESKİ"){


takimDurum[t].durum="YENİ";


}

else{


takimDurum[t].durum="ESKİ";


}



kaydet();

listele();



}







// =============================
// SÜRE HESABI
// =============================



function sureHesapla(a,b){



let fark=
new Date(b)-new Date(a);



let saat=
Math.floor(fark/3600000);



let dakika=
Math.floor(
(fark%3600000)/60000
);



return saat+" saat "+dakika+" dakika";



}









// =============================
// EKRANLARI YAZDIR
// =============================



function listele(){



document.getElementById("counter").innerHTML=
data.counter;





// BEKLEYENLER


let b="";


data.bekleyen.forEach((x,i)=>{


b+=`

<div class="is">


<b>${x.no}</b>


<br>


<button onclick="aktifEt(${i})">

İşi Aktif Et

</button>


</div>


`;



});


document.getElementById("bekleyen").innerHTML=b;







// AKTİF İŞ



let a="";



if(data.aktif){


a=`

<div class="is aktif">


<h3>${data.aktif.no}</h3>


Aktif Zaman:

<br>

${data.aktif.aktifZaman}


<br><br>


Aktif Eden:

${data.aktif.aktifEden}



<br><br>


<button onclick="tamamla()">

Tamamla

</button>



</div>


`;



gosterTakim=true;


}

else{


a="Aktif iş yok";

gosterTakim=false;


}



document.getElementById("aktif").innerHTML=a;







// TAKIMLAR



let tk="";



if(gosterTakim){



takimlar.forEach(t=>{



let renk="eski";


if(takimDurum[t].durum=="YENİ"){

renk="yeni";

}



tk+=`

<div class="is ${renk}">


<b>${t}</b>


<br>


Durum:

${takimDurum[t].durum}



<br>


<button onclick="takimDegistir('${t}')">

Değiştir

</button>



</div>


`;



});



}

else{


tk="Aktif iş yok";


}



document.getElementById("takimlar").innerHTML=tk;









// TAMAMLANANLAR


let t="";



data.tamamlanan.forEach((x,i)=>{



t+=`

<div class="is tamam">


<b>${x.no}</b>


<br>

Aktif:

${x.aktifZaman}


<br>


Tamam:

${x.tamamZaman}


<br>


Aktif eden:

${x.aktifEden}


<br>


Tamamlayan:

${x.tamamlayan}


<br>


Toplam süre:

${sureHesapla(x.aktifZaman,x.tamamZaman)}



<br><br>


<button onclick="tekrarAktif(${i})">

Tekrar Aktif Yap

</button>


</div>


`;



});



document.getElementById("tamamlanan").innerHTML=t;




}





let gosterTakim=false;



listele();


</script>


</body>

</html>
