<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CNC İş Emri Takip</title>

<style>

body{
font-family:Arial;
background:#eeeeee;
margin:20px;
}

h1{
background:#1f4e79;
color:white;
padding:15px;
text-align:center;
}

.panel{
background:white;
padding:15px;
margin-bottom:20px;
border-radius:10px;
}

input,button{
padding:10px;
margin:5px;
}

button{
background:#1f4e79;
color:white;
border:0;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#163a5c;
}

.is{
border:1px solid #aaa;
padding:10px;
margin:10px;
border-radius:5px;
}

.aktif{
background:#c6efce;
}

.tamam{
background:#ddd;
}

.sil{
background:red;
}


</style>

</head>


<body>


<h1>
CNC İŞ EMRİ TAKİP SİSTEMİ
</h1>


<div class="panel">

<h2>Üretim Durumu</h2>

Tamamlanan Parça:

<b id="counter">
0
</b>


</div>



<div class="panel">

<h2>Yeni İş Emri</h2>


<input id="isNo"
placeholder="İş Emri No">


<button onclick="yeniIs()">
Yeni İş Oluştur
</button>


</div>




<div class="panel">

<h2>Bekleyen İşler</h2>

<div id="bekleyen"></div>


</div>





<div class="panel">

<h2>Aktif İş</h2>

<div id="aktif"></div>


</div>






<div class="panel">

<h2>Tamamlanan İşler</h2>

<div id="tamamlanan"></div>


</div>



<script>


let data =
JSON.parse(localStorage.getItem("cncData"))
||
{
bekleyen:[],
aktif:null,
tamamlanan:[],
counter:0
};



function kaydet(){

localStorage.setItem(
"cncData",
JSON.stringify(data)
);

}




function zaman(){

return new Date().toISOString();

}




function yeniIs(){


let no=document.getElementById("isNo").value;


if(no=="")
{
alert("İş emri numarası giriniz");
return;
}


data.bekleyen.push({

no:no

});


kaydet();

listele();


document.getElementById("isNo").value="";


}







function aktifEt(index){


if(data.aktif!=null){

alert("Zaten aktif bir iş var");

return;

}


let kisi=
prompt("Aktif eden kişi adı");


if(!kisi){

alert("İsim girmeden aktif edilemez");

return;

}



let is=data.bekleyen[index];


data.bekleyen.splice(index,1);


data.aktif={

no:is.no,

aktifZaman:zaman(),

aktifEden:kisi

};



kaydet();

listele();


}






function tamamla(){


let kisi=
prompt("Tamamlayan kişi adı");


if(!kisi)
{
alert("İsim girmeden tamamlanamaz");
return;
}



data.aktif.tamamZaman=zaman();

data.aktif.tamamlayan=kisi;


data.tamamlanan.push(data.aktif);


data.aktif=null;


data.counter++;


kaydet();

listele();


}







function tekrarAktif(index){


if(data.aktif!=null){

alert("Başka aktif iş var");

return;

}



let is=data.tamamlanan[index];


data.tamamlanan.splice(index,1);


is.aktifZaman=zaman();

is.aktifEden="Tekrar aktif edildi";


data.aktif=is;


kaydet();

listele();


}







function sureHesapla(a,b){


let fark =
new Date(b)-new Date(a);


let saat =
Math.floor(fark/3600000);


let dakika =
Math.floor((fark%3600000)/60000);


return saat+" saat "+dakika+" dakika";


}







function listele(){



document.getElementById("counter").innerHTML=
data.counter;



let b="";


data.bekleyen.forEach((x,i)=>{


b+=`

<div class="is">

<b>${x.no}</b>

<br>

<button onclick="aktifEt(${i})">

İşi Aktif Et

</button>


</div>


`;


});


document.getElementById("bekleyen").innerHTML=b;








let a="";


if(data.aktif){


a=`

<div class="is aktif">


<h3>${data.aktif.no}</h3>


Aktif zamanı:
${data.aktif.aktifZaman}

<br>

Aktif eden:
${data.aktif.aktifEden}


<br><br>


<button onclick="tamamla()">

Tamamla

</button>


</div>


`;

}


else{

a="Aktif iş yok";

}


document.getElementById("aktif").innerHTML=a;







let t="";


data.tamamlanan.forEach((x,i)=>{


t+=`

<div class="is tamam">


<b>${x.no}</b>

<br>

Aktif:
${x.aktifZaman}

<br>

Tamam:
${x.tamamZaman}

<br>

Aktif eden:
${x.aktifEden}

<br>

Tamamlayan:
${x.tamamlayan}

<br>

Süre:
${sureHesapla(x.aktifZaman,x.tamamZaman)}


<br><br>


<button onclick="tekrarAktif(${i})">

Tekrar Aktif Yap

</button>



</div>


`;



});


document.getElementById("tamamlanan").innerHTML=t;



}



listele();



</script>


</body>
</html>
